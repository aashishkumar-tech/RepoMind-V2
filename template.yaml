AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  RepoMind V2 — Self-Serve CI Auto-Fix Agent with HITL
  Serverless pipeline: Webhook → SQS → Worker (LangGraph + S3 checkpointer)
  🔐 Sensitive values loaded from AWS Secrets Manager via shared/secrets.py
  📧 SMTP notifications via Gmail (App Password in Secrets Manager)
  🧠 RAG via Qdrant Cloud (API key secret created+managed by this stack)

# ─────────────────────────────────────────────────
# Global settings for all Lambda functions
# ─────────────────────────────────────────────────
Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64
    Environment:
      Variables:
        ENVIRONMENT: production
        LOG_LEVEL: INFO
        S3_DATA_BUCKET: !Ref DataBucket
        GITHUB_APP_ID: !Ref GitHubAppId
        GITHUB_INSTALLATION_ID: !Ref GitHubInstallationId
        # 🔐 Secrets Manager ARNs (loaded at runtime by shared/secrets.py)
        # The helper auto-detects JSON vs plain-string format and caches per warm start
        GITHUB_WEBHOOK_SECRET_ARN: !Ref GitHubWebhookSecretArn
        GROQ_API_KEY_SECRET_ARN: !Ref GroqApiKeyArn
        OPENAI_API_KEY_SECRET_ARN: !Ref OpenAIApiKeyArn
        # ─────────────────────────────────────────────
        # 📧 SMTP (Gmail) — used by shared/notifier.py
        # SMTP_PASSWORD itself is loaded from Secrets Manager at runtime
        # ─────────────────────────────────────────────
        SMTP_HOST: smtp.gmail.com
        SMTP_PORT: "587"
        SMTP_USE_TLS: "true"
        SMTP_FROM_NAME: RepoMind
        NOTIFICATIONS_ENABLED: "true"
        SMTP_USERNAME: !Ref SmtpUsername
        SMTP_PASSWORD_SECRET_ARN: !Ref SmtpPasswordSecretArn
        NOTIFICATION_EMAILS: !Ref NotificationEmails

# ─────────────────────────────────────────────────
# Parameters (set at deploy time via samconfig.toml)
# ─────────────────────────────────────────────────
Parameters:
  GitHubAppId:
    Type: String
    Description: GitHub App ID
  GitHubInstallationId:
    Type: String
    Description: GitHub App Installation ID
  # 🔐 ARNs are NOT secret (just AWS resource identifiers) — no NoEcho needed
  GitHubWebhookSecretArn:
    Type: String
    Description: ARN of GitHub webhook secret in AWS Secrets Manager
    AllowedPattern: "^arn:aws:secretsmanager:[a-z0-9-]+:\\d{12}:secret:.+"
  GroqApiKeyArn:
    Type: String
    Description: ARN of Groq API key in AWS Secrets Manager
    AllowedPattern: "^arn:aws:secretsmanager:[a-z0-9-]+:\\d{12}:secret:.+"
  OpenAIApiKeyArn:
    Type: String
    Description: ARN of OpenAI API key (for embeddings) in AWS Secrets Manager
    AllowedPattern: "^arn:aws:secretsmanager:[a-z0-9-]+:\\d{12}:secret:.+"
  PushgatewayUrl:
    Type: String
    Description: Prometheus Pushgateway URL (e.g. http://ec2-ip:9091)
    Default: ""

  # ─────────────────────────────────────────────
  # 📧 SMTP notification parameters
  # ─────────────────────────────────────────────
  SmtpUsername:
    Type: String
    Description: Gmail address used as SMTP sender (e.g. you@gmail.com)
  SmtpPasswordSecretArn:
    Type: String
    Description: ARN of Gmail App Password in AWS Secrets Manager
    AllowedPattern: "^arn:aws:secretsmanager:[a-z0-9-]+:\\d{12}:secret:.+"
  NotificationEmails:
    Type: String
    Description: Comma-separated recipient list (e.g. you@gmail.com,team@gmail.com)

  # ─────────────────────────────────────────────
  # 🧠 Qdrant (Vector DB for RAG) — Cloud-hosted
  #     The API key is stored in a Secret created by THIS stack
  #     (see QdrantApiKeySecret resource below). No separate
  #     `aws secretsmanager create-secret` call is required.
  # ─────────────────────────────────────────────
  QdrantHost:
    Type: String
    Description: Qdrant Cloud cluster URL (without https:// prefix)
  QdrantPort:
    Type: String
    Default: "6333"
    Description: Qdrant REST port (6333 standard, 6334 for gRPC)
  QdrantHttps:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Use TLS when connecting to Qdrant (true for Cloud)
  QdrantApiKeyValue:
    Type: String
    NoEcho: true
    MinLength: 20
    Description: >
      Qdrant Cloud API key (JWT). CloudFormation will store this value
      in AWS Secrets Manager as `repomind/qdrant-api-key`. NoEcho hides
      it from console/CloudFormation logs.

# ─────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────
Resources:
  # ── S3 Data Bucket ──
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "repomind-data-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteFullLogsAfter30Days
            Prefix: events/
            Status: Enabled
            ExpirationInDays: 180

  # ── SQS Queue ──
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: repomind-events
      VisibilityTimeout: 360
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  # ── Dead Letter Queue ──
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: repomind-events-dlq
      MessageRetentionPeriod: 1209600

  # ─────────────────────────────────────────────
  # 🧠 Qdrant API Key Secret (managed by this stack)
  # ─────────────────────────────────────────────
  # For `AWS::SecretsManager::Secret`, !Ref returns the full ARN — that's
  # what we pass to the Lambdas via QDRANT_API_KEY_SECRET_ARN and what we
  # grant Read on in the IAM policies below.
  #
  # ⚠️  CloudFormation will FAIL to create this resource if a secret
  #     named "repomind/qdrant-api-key" already exists in this account
  #     + region. If you previously created one manually, either:
  #       (a) delete it first:  aws secretsmanager delete-secret ...
  #       (b) OR remove the `Name:` line below to let CloudFormation
  #           auto-generate a unique name.
  QdrantApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: repomind/qdrant-api-key
      Description: Qdrant Cloud API key for RepoMind RAG (managed by SAM stack)
      SecretString: !Ref QdrantApiKeyValue
      Tags:
        - Key: Project
          Value: RepoMind
        - Key: Component
          Value: RAG
        - Key: ManagedBy
          Value: CloudFormation

  # ── Webhook Handler (API Gateway + Lambda) ──
  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: repomind-webhook
      Handler: webhook.lambda_handler.handler
      CodeUri: .
      Description: Receives GitHub webhooks and queues events
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref EventQueue
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt EventQueue.QueueName
        # 🔐 Read all secrets — shared/config.py + shared/notifier.py
        # eagerly load at cold start. Granting all up-front avoids
        # AccessDenied noise in CloudWatch.
        # Blast radius stays small: each ARN is explicitly listed (not "*").
        # NOTE: QdrantApiKeySecret included even though webhook doesn't use
        # RAG — shared/config.py loads all secrets at import time on every
        # cold start.
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref GitHubWebhookSecretArn
                - !Ref GroqApiKeyArn
                - !Ref OpenAIApiKeyArn
                - !Ref SmtpPasswordSecretArn
                - !Ref QdrantApiKeySecret
      Events:
        WebhookApi:
          Type: Api
          Properties:
            Path: /webhook
            Method: POST
        HealthApi:
          Type: Api
          Properties:
            Path: /health
            Method: GET

  # ── Worker (SQS-triggered Lambda — RepoMind V2 core pipeline) ──
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: repomind-worker
      Handler: worker.main.lambda_handler
      CodeUri: .
      Description: Core pipeline orchestrator - processes CI failures
      MemorySize: 1024
      Timeout: 300
      Environment:
        Variables:
          GITHUB_PRIVATE_KEY_PATH: /var/task/private-key.pem
          PUSHGATEWAY_URL: !Ref PushgatewayUrl
          METRICS_ENABLED: "true"
          KILL_SWITCH_PARAM: /repomind/kill_switch
          VERIFICATION_ENABLED: "true"
          MAX_ROLLBACKS_PER_HOUR: "3"
          # ── 🧠 Qdrant (RAG) ──
          # The API key itself is loaded from Secrets Manager at runtime
          # via shared/config.py → shared/secrets.py (consistent with
          # every other secret in this template).
          QDRANT_HOST: !Ref QdrantHost
          QDRANT_PORT: !Ref QdrantPort
          QDRANT_HTTPS: !Ref QdrantHttps
          QDRANT_API_KEY_SECRET_ARN: !Ref QdrantApiKeySecret
          QDRANT_TIMEOUT: "5"
          QDRANT_CIRCUIT_BREAKER_TTL: "60"
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - SQSPollerPolicy:
            QueueName: !GetAtt EventQueue.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/repomind/*"
        # 🔐 Read all secrets — shared/config.py + shared/notifier.py
        # eagerly load at cold start. Granting all up-front avoids
        # AccessDenied noise in CloudWatch.
        # Blast radius stays small: each ARN is explicitly listed (not "*").
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref GitHubWebhookSecretArn
                - !Ref GroqApiKeyArn
                - !Ref OpenAIApiKeyArn
                - !Ref SmtpPasswordSecretArn
                - !Ref QdrantApiKeySecret
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt EventQueue.Arn
            BatchSize: 1

# ─────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────
Outputs:
  WebhookUrl:
    Description: URL for GitHub webhook
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook"
  EventQueueUrl:
    Description: SQS Queue URL
    Value: !Ref EventQueue
  DataBucketName:
    Description: S3 Data Bucket
    Value: !Ref DataBucket
  NotificationEmails:
    Description: Notification recipients (comma-separated)
    Value: !Ref NotificationEmails
  QdrantHost:
    Description: Qdrant cluster endpoint (RAG)
    Value: !Ref QdrantHost
  QdrantApiKeySecretArn:
    Description: ARN of the Qdrant API key secret (CloudFormation-managed)
    Value: !Ref QdrantApiKeySecret
